<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOGIN TIPO NETFLIX -->
<div id="login" class="container">

  <h2>🎮 Elige tu perfil</h2>

  <div class="profile-grid">

    <div class="profile-card" onclick="selectUser('Cristian', event)">
      <div class="avatar">👤</div>
      <div class="name">Cristian</div>
    </div>

    <div class="profile-card" onclick="selectUser('Nayeli', event)">
      <div class="avatar">👤</div>
      <div class="name">Nayeli</div>
    </div>

    <div class="profile-card" onclick="selectUser('Prueba', event)">
      <div class="avatar">👤</div>
      <div class="name">Prueba</div>
    </div>

  </div>

  <div id="selectedUser" class="selected-user">
    Ningún perfil seleccionado
  </div>

  <input id="password" type="password" placeholder="Ingresa contraseña">

  <button onclick="login()">Entrar</button>

  <p id="error"></p>

</div>

<!-- JUEGO -->
<div id="game" class="container" style="display:none">

<h1>🎰 CASINO 🎰</h1>

<div class="stats">
  💰 <span id="coins">0</span>
  ⭐ <span id="points">0</span>
  💵 <span id="quetzales">0</span>
</div>

<!-- SLOT -->
<div class="machine">
  <div class="column">
    <div class="cell" id="c1r1"></div>
    <div class="cell middle" id="c1r2"></div>
    <div class="cell" id="c1r3"></div>
  </div>

  <div class="column">
    <div class="cell" id="c2r1"></div>
    <div class="cell middle" id="c2r2"></div>
    <div class="cell" id="c2r3"></div>
  </div>

  <div class="column">
    <div class="cell" id="c3r1"></div>
    <div class="cell middle" id="c3r2"></div>
    <div class="cell" id="c3r3"></div>
  </div>
</div>

<button onclick="spin()">🎲 GIRAR (100)</button>
<button onclick="convertPoints()">💱 Canjear puntos</button>

<hr>

<h3>📸 500 monedas</h3>
<a class="wa-btn" href="https://wa.me/573026782036?text=Te%20envio%20mi%20selfie%20para%20500%20monedas">Enviar selfie</a>
<input id="key500" placeholder="Clave 500">
<button onclick="redeem('key500','K500',500)">Canjear 500</button>

<h3>🎤 200 monedas</h3>
<a class="wa-btn" href="https://wa.me/573026782036?text=Te%20envio%20mi%20audio%20para%20200%20monedas">Enviar audio</a>
<input id="key200" placeholder="Clave 200">
<button onclick="redeem('key200','K200',200)">Canjear 200</button>

</div>

<script src="script.js"></script>
</body>
</html>
