<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🎰 Casino del Amor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="casino">

    <h1 class="title">🎰 CASINO DEL AMOR 🎰</h1>

    <div class="saldo">
      💰 Monedas: <span id="coins">1000</span>
    </div>

    <div class="machine">
      <div class="reel" id="r1"></div>
      <div class="reel" id="r2"></div>
      <div class="reel" id="r3"></div>
    </div>

    <button id="spinBtn" onclick="spin()">GIRAR (100)</button>

    <p id="resultado"></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
